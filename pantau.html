<!doctype html>
<html lang="id">
  <head>
    <title>Pantau ASKA SDIT Al Manar 2026</title>
    <link rel="icon" type="image/x-icon" href="almanar.png" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <style>
      :root {
        --primary-green: #2ecc71;
        --dark-green: #27ae60;
        --light-bg: #f8f9fa;
      }

      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background-color: var(--light-bg);
        color: #2d3436;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .monitor-header {
        background: linear-gradient(
          135deg,
          var(--primary-green),
          var(--dark-green)
        );
        color: white;
        padding: 20px 0;
        box-shadow: 0 4px 15px rgba(39, 174, 96, 0.15);
      }

      .logo-img {
        max-height: 50px;
        width: auto;
      }

      .monitor-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 25px;
      }

      .card-monitor {
        background: white;
        border: none;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        padding: 25px;
      }

      .table-responsive {
        margin-top: 15px;
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid #edf2f7;
      }

      .table {
        margin-bottom: 0;
      }

      .table th {
        background-color: #f8f9fa;
        color: #4a5568;
        font-weight: 700;
        text-transform: uppercase;
        font-size: 0.85rem;
        letter-spacing: 0.5px;
        padding: 15px;
        border-bottom: 2px solid #edf2f7;
      }

      .table td {
        padding: 15px;
        vertical-align: middle;
        color: #2d3436;
        border-bottom: 1px solid #edf2f7;
      }

      .table tr:last-child td {
        border-bottom: none;
      }

      .btn-buka {
        background-color: var(--primary-green);
        color: white;
        font-weight: 600;
        border-radius: 8px;
        transition: all 0.2s ease;
      }

      .btn-buka:hover {
        background-color: var(--dark-green);
        color: white;
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(46, 204, 113, 0.2);
      }

      /* Style tombol non-aktif */
      .btn-buka.disabled,
      .btn-buka:disabled {
        background-color: #e2e8f0 !important;
        color: #a0aec0 !important;
        border-color: #e2e8f0 !important;
        transform: none !important;
        box-shadow: none !important;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <header class="monitor-header">
      <div
        class="container-fluid px-4 d-flex justify-content-between align-items-center"
      >
        <div class="d-flex align-items-center">
          <img
            src="almanar.png"
            class="logo-img me-3"
            alt="Logo"
            onerror="this.style.display = 'none'"
          />
          <div>
            <h4 class="fw-bold m-0 text-white">Halaman Pantau</h4>
            <p class="small m-0 opacity-75">ASKA SDIT Al Manar 2026</p>
          </div>
        </div>
        <div class="text-end d-none d-md-block">
          <span class="badge bg-white text-dark p-2 fs-6">
            <i class="fas fa-desktop me-2 text-success"></i>Dashboard Panitia
          </span>
        </div>
      </div>
    </header>

    <main class="monitor-container container-fluid">
      <div class="card-monitor">
        <div
          class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2"
        >
          <div>
            <h5 class="fw-bold m-0 text-dark">
              Daftar Jadwal & Link Monitoring
            </h5>
            <p class="text-muted small m-0">
              Silahkan pilih sesi ujian yang ingin dipantau
            </p>
          </div>
          <div id="live-clock" class="badge bg-dark p-2 fs-6"></div>
        </div>

        <div class="table-responsive">
          <table class="table table-hover align-middle">
            <thead>
              <tr>
                <th style="width: 8%">No</th>
                <th style="width: 25%">Hari & Tanggal</th>
                <th style="width: 15%">Sesi / Waktu</th>
                <th style="width: 27%">Mata Pelajaran</th>
                <th style="width: 25%" class="text-center">Aksi</th>
              </tr>
            </thead>
            <tbody id="tabel-jadwal-body"></tbody>
          </table>
        </div>
      </div>
    </main>

    <footer class="text-center py-3 text-muted border-top bg-white small">
      <p class="m-0">&copy; 2026 SDIT Al Manar - Panitia ASKA Online</p>
    </footer>

    <script>
      const tabelBody = document.getElementById("tabel-jadwal-body");

      const jadwal = [
        {
          tgl: "2026-05-18",
          sesi: 1,
          mulai: 745, // Jam 07:45
          selesai: 915, // Jam 09:15
          mapel: "PAI",
          link: "https://docs.google.com/spreadsheets/d/1yQGsRJVtxHR-BBU0NG774coc2tfn2uVAFULp_k3zsPY/edit?usp=sharing",
        },
        {
          tgl: "2026-05-18",
          sesi: 2,
          mulai: 930, // Jam 09:30
          selesai: 1100,
          mapel: "Pancasila",
          link: "https://docs.google.com/spreadsheets/d/1tWEMKBQ9r37comTV-N9Am-1yye9_GhxLexi2ky5WhTg/edit?usp=sharing",
        },
        {
          tgl: "2026-05-19",
          sesi: 1,
          mulai: 745,
          selesai: 915,
          mapel: "B.Indonesia",
          link: "https://docs.google.com/spreadsheets/d/1mvVu9Y-XIOgX1J_NVqMTq9AM2P517d-OvF3MvcY9xIQ/edit?usp=sharing",
        },
        {
          tgl: "2026-05-19",
          sesi: 2,
          mulai: 930,
          selesai: 1100,
          mapel: "SKI",
          link: "https://docs.google.com/spreadsheets/d/1gjulFGXxSofYjdVIo9o1VefbKTQHJvk3bbcAR5rpoE8/edit?usp=sharing",
        },
        {
          tgl: "2026-05-20",
          sesi: 1,
          mulai: 745,
          selesai: 915,
          mapel: "B.Inggris",
          link: "", // Isi jika link sudah siap
        },
        {
          tgl: "2026-05-20",
          sesi: 2,
          mulai: 930,
          selesai: 1130,
          mapel: "Matematika",
          link: "",
        },
        {
          tgl: "2026-05-21",
          sesi: 1,
          mulai: 745,
          selesai: 915,
          mapel: "IPAS",
          link: "",
        },
        {
          tgl: "2026-05-21",
          sesi: 2,
          mulai: 930,
          selesai: 1130,
          mapel: "PLBJ",
          link: "",
        },
        {
          tgl: "2026-05-22",
          sesi: 1,
          mulai: 745,
          selesai: 915,
          mapel: "B.Arab",
          link: "",
        },
      ];

      function formatHariTanggal(strTanggal) {
        const opsi = {
          weekday: "long",
          year: "numeric",
          month: "long",
          day: "numeric",
        };
        return new Date(strTanggal).toLocaleDateString("id-ID", opsi);
      }

      function formatJam(waktuAngka) {
        const jam = String(Math.floor(waktuAngka / 100)).padStart(2, "0");
        const menit = String(waktuAngka % 100).padStart(2, "0");
        return `${jam}:${menit}`;
      }

      function renderTabel() {
        tabelBody.innerHTML = "";

        // Mengambil data tanggal dan jam saat ini
        const sekarang = new Date();

        // Format YYYY-MM-DD lokal saat ini
        const thn = sekarang.getFullYear();
        const bln = String(sekarang.getMonth() + 1).padStart(2, "0");
        const tgl = String(sekarang.getDate()).padStart(2, "0");
        const tanggalSekarangStr = `${thn}-${bln}-${tgl}`;

        // Format jam menit saat ini (Contoh: 07:45 -> 745)
        const jamMenitSekarangAngka =
          sekarang.getHours() * 100 + sekarang.getMinutes();

        jadwal.forEach((item, index) => {
          let tombolHtml = "";
          let statusBuka = false;

          // LOGIKA PENGECEKAN WAKTU
          if (tanggalSekarangStr > item.tgl) {
            // 1. Jika tanggal hari ini sudah melewati tanggal jadwal -> Buka (Jadwal Lewat)
            statusBuka = true;
          } else if (tanggalSekarangStr === item.tgl) {
            // 2. Jika hari ini adalah hari ujian -> Cek apakah jam sekarang sudah masuk jam mulai ujian
            if (jamMenitSekarangAngka >= item.mulai) {
              statusBuka = true;
            }
          }

          // JIKA LINK BELUM DIMASUKKAN SAMA SEKALI
          if (!item.link || item.link.trim() === "") {
            tombolHtml = `
              <button disabled class="btn btn-sm btn-buka disabled px-3 py-2">
                <i class="fas fa-lock me-1"></i> Belum Tersedia
              </button>
            `;
          }
          // JIKA LINK ADA TAPI BELUM WAKTUNYA UJIAN
          else if (!statusBuka) {
            tombolHtml = `
              <button disabled class="btn btn-sm btn-buka disabled px-3 py-2">
                <i class="fas fa-clock me-1"></i> Belum Waktunya
              </button>
            `;
          }
          // JIKA LINK ADA DAN SUDAH MASUK/MELEWATI JAM JADWAL
          else {
            tombolHtml = `
              <a href="${item.link}" target="_blank" class="btn btn-sm btn-buka px-3 py-2">
                <i class="fas fa-external-link-alt me-1"></i> Buka Pantauan
              </a>
            `;
          }

          const barisHtml = `
            <tr>
              <td class="fw-bold text-secondary">${index + 1}</td>
              <td class="fw-semibold">${formatHariTanggal(item.tgl)}</td>
              <td>
                <span class="badge bg-secondary mb-1 d-block" style="max-width: fit-content;">Sesi ${item.sesi}</span>
                <small class="text-muted d-block"><i class="far fa-clock me-1"></i>${formatJam(item.mulai)} - ${formatJam(item.selesai)}</small>
              </td>
              <td><strong class="text-success">${item.mapel}</strong></td>
              <td class="text-center">${tombolHtml}</td>
            </tr>
          `;
          tabelBody.insertAdjacentHTML("beforeend", barisHtml);
        });
      }

      function updateJam() {
        const sekarang = new Date();
        document.getElementById("live-clock").innerHTML =
          `<i class="fas fa-clock me-2"></i>${sekarang.toLocaleTimeString("id-ID")} WIB`;

        // Panggil renderTabel setiap menit/detik agar status tombol berubah otomatis tanpa refresh halaman saat jam berganti
        renderTabel();
      }

      window.onload = function () {
        updateJam();
        setInterval(updateJam, 1000); // Sinkronisasi jam dan status tombol setiap 1 detik
      };
    </script>
  </body>
</html>
